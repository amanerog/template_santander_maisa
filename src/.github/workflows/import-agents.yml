name: Import Maisa Agents

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target Maisa URL (e.g. https://gppaas-maisa-plat.sgtech.pre.corp)"
        required: true
      workspace_name:
        description: "Workspace SOURCE in Git (folder agents/<workspace_name>/...)"
        required: true
      target_workspace_name:
        description: "Key in MAISA_API_KEYS_JSON to resolve the cookie for the target"
        required: true
      target_organization_id:
        description: "Target Maisa organization ID"
        required: true
      target_workspace_id:
        description: "Target Maisa workspace ID"
        required: true
      snapshot:
        description: "Snapshot folder (YYYYMMDD-HHMMSS). Empty = latest"
        required: false
      mode:
        description: "Import mode: all = import all agents, single = import one by id"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "single"
      agent_id:
        description: "Agent id (only if mode=single). It's the wm_id part of the .b64 filename"
        required: false
      skip_import:
        description: "Skip the import step and test an already-deployed agent instead"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      test_wm_id:
        description: "Worker Manager ID of the already-deployed agent to test (required when skip_import=true)"
        required: false

  workflow_call:
    inputs:
      target_url:
        required: true
        type: string
      workspace_name:
        required: true
        type: string
      target_workspace_name:
        required: true
        type: string
      target_organization_id:
        required: true
        type: string
      target_workspace_id:
        required: true
        type: string
      snapshot:
        required: false
        type: string
      mode:
        required: false
        type: string
        default: "all"
      agent_id:
        required: false
        type: string
      skip_import:
        required: false
        type: string
        default: "false"
      test_wm_id:
        required: false
        type: string
    secrets:
      maisa_api_keys_json:
        required: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: QA gate — runs qa-test.py without credentials (must print OK)
  # ---------------------------------------------------------------------------
  qa-test:
    name: QA gate (pre-check)
    runs-on: base-runner

    steps:
      - name: Checkout main branch (read scripts)
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 1


      - name: Run QA test script (must print OK)
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "scripts/qa-test.py" ]; then
            echo "❌ scripts/qa-test.py not found. Failing pipeline."
            exit 1
          fi

          echo "✅ QA test script found. Running pre-check (no credentials)..."

          OUT="$(python scripts/qa-test.py | tee /dev/stderr)"

          if ! echo "$OUT" | grep -q "OK"; then
            echo "❌ qa-test.py did not print OK. Failing workflow."
            exit 1
          fi

          echo "✅ QA pre-check passed"

  # ---------------------------------------------------------------------------
  # JOB 2: Import agents from Git snapshot into Maisa
  # Skipped when skip_import=true — the post-import job will test the agent
  # specified by test_wm_id in the origin environment instead.
  # ---------------------------------------------------------------------------
  import-agents:
    name: Import agents
    runs-on: base-runner
    needs: qa-test
    if: inputs.skip_import != 'true'

    steps:
      - name: Checkout export branch (read exports)
        uses: actions/checkout@v4
        with:
          ref: feature/export-data
          fetch-depth: 1


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Import agents from Git snapshot
        env:
          TARGET_MAISA_URL: ${{ inputs.target_url }}
          TARGET_MAISA_COOKIE: ${{ secrets.maisa_auth_credential || secrets.MAISA_AUTH_CREDENTIAL }}
          TARGET_ORGANIZATION_ID: ${{ inputs.target_organization_id }}
          TARGET_WORKSPACE_ID: ${{ inputs.target_workspace_id }}
          WORKSPACE_NAME: ${{ inputs.workspace_name }}
          SNAPSHOT: ${{ inputs.snapshot }}
          MODE: ${{ inputs.mode }}
          AGENT_ID: ${{ inputs.agent_id }}
        run: |
          python << 'EOF'
          import asyncio
          import base64
          import json
          import os
          import tempfile
          from dataclasses import dataclass, field
          from pathlib import Path
          from typing import Any, Dict, List, Optional
          import httpx

          TIMEOUT = 120

          @dataclass
          class MaisaAPI:
              base_url: str
              cookie: str

              def _headers(self) -> Dict[str, str]:
                  return {
                      "Cookie": self.cookie,
                      "User-Agent": "Mozilla/5.0 (compatible; MaisaImporter/1.0)",
                  }

              def _url(self, path: str) -> str:
                  return f"{self.base_url.rstrip('/')}/maisa-bff{path}"

              async def _request(
                  self,
                  method: str,
                  path: str,
                  *,
                  json_body: Optional[Any] = None,
                  content_type: Optional[str] = None,
                  body: Optional[bytes] = None,
              ) -> Any:
                  url = self._url(path)
                  while True:
                      async with httpx.AsyncClient(timeout=TIMEOUT, verify=False, follow_redirects=True) as client:
                          headers = self._headers()
                          if content_type:
                              headers["Content-Type"] = content_type
                          elif json_body is not None:
                              headers["Content-Type"] = "application/json"
                          kwargs: Dict[str, Any] = {"headers": headers}
                          if json_body is not None:
                              kwargs["json"] = json_body
                          if body is not None:
                              kwargs["content"] = body
                          resp = await client.request(method, url, **kwargs)
                          if resp.status_code == 429:
                              print("  ⏳ Rate limited, waiting 2s...")
                              await asyncio.sleep(2)
                              continue
                          if resp.status_code >= 400:
                              raise RuntimeError(f"HTTP {resp.status_code}: {resp.text[:300]}")
                          if not resp.content:
                              return None
                          return resp.json()

              async def post(self, path: str, **kw: Any) -> Any:
                  return await self._request("POST", path, **kw)

          # ── .b64 → .mai conversion ────────────────────────────────────────────

          def b64_file_to_mai(b64_path: Path, mai_path: Path) -> None:
              """
              Read a .b64 export file and write it as a .mai file.

              The .b64 file contains either:
                - Raw UTF-8 content from the Maisa export endpoint (saved as-is)
                - A base64-encoded binary blob (when the export was not valid UTF-8)

              The .mai file is the native Maisa import format — it holds the same
              content that the export endpoint originally returned.
              """
              raw = b64_path.read_text(encoding="utf-8").strip()

              # Try to detect if the content is itself base64-encoded binary
              try:
                  decoded_bytes = base64.b64decode(raw)
                  # Check if the decoded bytes look like JSON (Maisa export format)
                  decoded_text = decoded_bytes.decode("utf-8")
                  json.loads(decoded_text)
                  # It was base64-encoded JSON → write the decoded text as .mai
                  mai_path.write_text(decoded_text, encoding="utf-8")
                  print(f"    ↳ Decoded base64 → JSON → {mai_path.name}")
              except Exception:
                  # Content is already the raw export text (JSON or other format)
                  mai_path.write_text(raw, encoding="utf-8")
                  print(f"    ↳ Raw text → {mai_path.name}")

          # ── Snapshot resolution ───────────────────────────────────────────────

          def pick_snapshot_dir(base_dir: Path, snapshot: str) -> Path:
              if snapshot:
                  p = base_dir / snapshot
                  if not p.exists():
                      raise RuntimeError(f"Snapshot folder not found: {p}")
                  return p
              candidates = sorted(p for p in base_dir.iterdir() if p.is_dir())
              if not candidates:
                  raise RuntimeError(f"No snapshot folders found under {base_dir}")
              return candidates[-1]

          def filename_agent_id(p: Path) -> str:
              parts = p.stem.split("__")
              return parts[-1] if len(parts) >= 2 else p.stem

          # ── Import function (API call) ─────────────────────────────────────────

          async def import_agent(api: MaisaAPI, org_id: str, ws_id: str, mai_path: Path) -> Any:
              """
              TODO: Import API specification not yet available.

              Once the Maisa import endpoint is documented, implement the call here.
              Expected pattern (subject to change):
                POST /maisa-bff/organizations/{org_id}/workspaces/{ws_id}/workers/import
                Body: multipart or JSON with the .mai file content

              For now this function is a no-op placeholder that logs what would be sent.
              """
              mai_content = mai_path.read_text(encoding="utf-8")
              print(f"    ⚠️  [IMPORT API NOT IMPLEMENTED] Would POST .mai content ({len(mai_content)} chars)")
              print(f"       Target org:       {org_id}")
              print(f"       Target workspace: {ws_id}")
              print(f"       File:             {mai_path.name}")
              # ----------------------------------------------------------------
              # Uncomment and adapt when the import API spec is available:
              #
              # return await api.post(
              #     f"/organizations/{org_id}/workspaces/{ws_id}/workers/import",
              #     json_body={"definition": mai_content},
              # )
              # ----------------------------------------------------------------
              return None

          # ── Main ──────────────────────────────────────────────────────────────

          @dataclass
          class ImportResult:
              imported: List[Dict[str, Any]] = field(default_factory=list)
              errors: List[str] = field(default_factory=list)

          async def main():
              target_url  = os.environ["TARGET_MAISA_URL"].strip()
              cookie      = os.environ["TARGET_MAISA_COOKIE"]
              org_id      = os.environ["TARGET_ORGANIZATION_ID"].strip()
              ws_id       = os.environ["TARGET_WORKSPACE_ID"].strip()
              workspace   = os.environ["WORKSPACE_NAME"].strip()
              snapshot    = os.environ.get("SNAPSHOT", "").strip()
              mode        = os.environ.get("MODE", "all").strip()
              agent_id    = os.environ.get("AGENT_ID", "").strip()

              if mode not in ("all", "single"):
                  raise SystemExit(f"❌ Invalid mode: {mode}")
              if mode == "single" and not agent_id:
                  raise SystemExit("❌ mode=single requires agent_id")

              base_dir = Path("agents") / workspace
              if not base_dir.exists():
                  raise SystemExit(f"❌ Workspace folder not found: {base_dir}")

              snapshot_dir = pick_snapshot_dir(base_dir, snapshot)
              print(f"📦 Using snapshot: {snapshot_dir}")

              files = sorted(snapshot_dir.glob("*.b64"))
              if mode == "single":
                  files = [p for p in files if filename_agent_id(p) == agent_id]
                  if not files:
                      raise SystemExit(f"❌ No .b64 file found for agent_id={agent_id} in {snapshot_dir}")

              print(f"⚙️  Found {len(files)} file(s) to import")

              api    = MaisaAPI(base_url=target_url, cookie=cookie)
              result = ImportResult()

              print("=" * 60)
              print("Maisa Agent Import (from Git)")
              print("=" * 60)
              print(f"Target URL:       {target_url}")
              print(f"Organization ID:  {org_id}")
              print(f"Workspace ID:     {ws_id}")
              print(f"Git folder:       {workspace}")
              print(f"Snapshot:         {snapshot_dir.name}")
              print(f"Mode:             {mode}")
              print("=" * 60)

              with tempfile.TemporaryDirectory() as tmp:
                  tmp_dir = Path(tmp)

                  for p in files:
                      agent_id_in_file = filename_agent_id(p)
                      print(f"\n  File: {p.name}")

                      # Step 1: convert .b64 → .mai
                      mai_path = tmp_dir / p.with_suffix(".mai").name
                      try:
                          b64_file_to_mai(p, mai_path)
                      except Exception as e:
                          msg = f"File '{p.name}': conversion failed: {e}"
                          result.errors.append(msg)
                          print(f"    ❌ {msg}")
                          continue

                      # Step 2: call import API
                      try:
                          resp = await import_agent(api, org_id, ws_id, mai_path)
                          print(f"    ✅ Import submitted for {p.name}")
                          result.imported.append({"file": p.name, "agent_id": agent_id_in_file, "response": str(resp)})
                      except Exception as e:
                          msg = f"File '{p.name}': import API call failed: {e}"
                          result.errors.append(msg)
                          print(f"    ❌ {msg}")

              print("\n" + "=" * 60)
              print("Import Summary")
              print("=" * 60)
              print(f"  Processed: {len(files)}")
              print(f"  Submitted: {len(result.imported)}")
              if result.errors:
                  print(f"\n  ❌ Errors ({len(result.errors)}):")
                  for err in result.errors:
                      print(f"    - {err}")
                  raise SystemExit(1)

          asyncio.run(main())
          EOF

  # ---------------------------------------------------------------------------
  # JOB 3: Post-import — run QA golden dataset tests against the deployed agent.
  # Runs whether import-agents succeeded OR was skipped (skip_import=true).
  # When skip_import=true, TEST_WM_ID is passed so qa-test.py targets that
  # specific already-deployed agent directly.
  # ---------------------------------------------------------------------------
  post-import:
    name: Post-import QA tests
    runs-on: base-runner
    needs: [qa-test, import-agents]
    if: |
      always() &&
      needs.qa-test.result == 'success' &&
      (needs.import-agents.result == 'success' || needs.import-agents.result == 'skipped')

    steps:
      - name: Checkout main branch (read scripts and dataset)
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 1


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run QA golden dataset tests
        env:
          TARGET_MAISA_URL: ${{ inputs.target_url }}
          MAISA_AUTH_CREDENTIAL: ${{ secrets.maisa_auth_credential || secrets.MAISA_AUTH_CREDENTIAL }}
          AUTH_TYPE: cookie
          ORGANIZATION_ID: ${{ inputs.target_organization_id }}
          WORKSPACE_ID: ${{ inputs.target_workspace_id }}
          WORKSPACE_NAME: ${{ inputs.workspace_name }}
          SNAPSHOT: ${{ inputs.snapshot }}
          AGENT_ID: ${{ inputs.agent_id }}
          TEST_WM_ID: ${{ inputs.test_wm_id }}
        shell: bash
        run: |
          if [ ! -f "scripts/qa-dataset.json" ]; then
            echo "⚠️  scripts/qa-dataset.json not found. Skipping golden dataset tests."
            exit 0
          fi
          echo "✅ Golden dataset found. Running QA tests against deployed agent..."
          python scripts/qa-test.py

      - name: Check if post-import script exists
        id: check-post-import
        shell: bash
        run: |
          if [ ! -f "scripts/post_import.py" ]; then
            echo "⚠️  scripts/post_import.py not found. Skipping."
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Run post-import script
        if: steps.check-post-import.outputs.exists == 'true'
        env:
          TARGET_MAISA_URL: ${{ inputs.target_url }}
          MAISA_AUTH_CREDENTIAL: ${{ secrets.maisa_auth_credential || secrets.MAISA_AUTH_CREDENTIAL }}
          AUTH_TYPE: cookie
          ORGANIZATION_ID: ${{ inputs.target_organization_id }}
          WORKSPACE_ID: ${{ inputs.target_workspace_id }}
          WORKSPACE_NAME: ${{ inputs.workspace_name }}
          SNAPSHOT: ${{ inputs.snapshot }}
          AGENT_ID: ${{ inputs.agent_id }}
          TEST_WM_ID: ${{ inputs.test_wm_id }}
        run: |
          python scripts/post_import.py
