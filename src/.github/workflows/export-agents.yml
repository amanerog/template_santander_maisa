name: Export Maisa Agents

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Source Maisa URL (e.g., https://gppaas-maisa-plat.sgtech.pre.corp)"
        required: true
      workspace_name:
        description: "Folder name for Git storage (agents/<workspace_name>/...)"
        required: true
      organization_id:
        description: "Organization ID in Maisa"
        required: true
      workspace_id:
        description: "Workspace ID in Maisa to export from"
        required: true
      auth_type:
        description: "Authentication type"
        required: true
        default: "cookie"
        type: choice
        options:
          - "cookie"
          - "api_key"
      mode:
        description: "Export mode: all = all agents, single = one agent by Worker Manager ID"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "single"
      worker_manager_id:
        description: "Worker Manager ID (only if mode=single)"
        required: false

  workflow_call:
    inputs:
      source_url:
        required: true
        type: string
      workspace_name:
        required: true
        type: string
      organization_id:
        required: true
        type: string
      workspace_id:
        required: true
        type: string
      auth_type:
        required: false
        type: string
        default: "cookie"
      mode:
        required: false
        type: string
        default: "all"
      worker_manager_id:
        required: false
        type: string
    secrets:
      maisa_auth_credential:
        required: true

permissions:
  contents: write

jobs:
  export-agents:
    runs-on: base-runner

    steps:
      - name: Checkout export branch
        uses: actions/checkout@v4
        with:
          ref: feature/export-data
          fetch-depth: 0

      - name: Compute export timestamp
        id: ts
        shell: bash
        run: |
          echo "value=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Export agents to agents/<workspace>/<timestamp>
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          MAISA_AUTH_CREDENTIAL: ${{ secrets.maisa_auth_credential || secrets.MAISA_AUTH_CREDENTIAL }}
          AUTH_TYPE: ${{ inputs.auth_type }}
          ORGANIZATION_ID: ${{ inputs.organization_id }}
          WORKSPACE_ID: ${{ inputs.workspace_id }}
          WORKSPACE_NAME: ${{ inputs.workspace_name }}
          MODE: ${{ inputs.mode }}
          WORKER_MANAGER_ID: ${{ inputs.worker_manager_id }}
          EXPORT_DIR: agents/${{ inputs.workspace_name }}/${{ steps.ts.outputs.value }}
        run: |
          python << 'EOF'
          import asyncio
          import base64
          import os
          import json
          import ssl
          from dataclasses import dataclass
          from typing import Any, Optional, Dict, List
          from pathlib import Path
          import httpx

          TIMEOUT = 120

          @dataclass
          class MaisaAPI:
              base_url: str
              auth_credential: str
              auth_type: str  # "cookie" or "api_key"

              def _headers(self) -> Dict[str, str]:
                  headers = {
                      "Accept": "application/json",
                      "Content-Type": "application/json",
                      "User-Agent": "Mozilla/5.0 (compatible; MaisaExporter/1.0)"
                  }
                  if self.auth_type == "api_key":
                      headers["Authorization"] = f"Bearer {self.auth_credential}"
                  elif self.auth_type == "cookie":
                      headers["Cookie"] = self.auth_credential
                  return headers

              async def _request(
                  self,
                  method: str,
                  path: str,
                  *,
                  params: Optional[Dict[str, Any]] = None,
                  raw: bool = False,
              ) -> Any:
                  url = f"{self.base_url.rstrip('/')}{path}"

                  while True:
                      async with httpx.AsyncClient(
                          timeout=TIMEOUT,
                          verify=False,
                          follow_redirects=True
                      ) as client:
                          kwargs = {"headers": self._headers()}
                          if params is not None:
                              kwargs["params"] = params

                          qs = "&".join(f"{k}={v}" for k, v in (params or {}).items())
                          full_url = f"{url}?{qs}" if qs else url
                          safe_cookie = self.auth_credential[:40] + "...[MASKED]" if self.auth_type == "cookie" else ""
                          print(f"🌐 {method} {full_url}")
                          if safe_cookie:
                              print(f"   Cookie: {safe_cookie}")

                          resp = await client.request(method, url, **kwargs)

                          if resp.status_code == 429:
                              print("  ⏳ Rate limited, waiting 2s...")
                              await asyncio.sleep(2)
                              continue

                          if resp.status_code >= 400:
                              raise Exception(f"HTTP {resp.status_code}: {resp.text[:500]}")

                          if raw:
                              return resp.content

                          if not resp.content:
                              return None

                          return resp.json()

              async def get(self, path: str, **kw: Any) -> Any:
                  return await self._request("GET", path, **kw)

              async def get_paginated(self, path: str, *, page_size: int = 100) -> List[Dict[str, Any]]:
                  items: List[Dict[str, Any]] = []
                  page = 1
                  while True:
                      resp = await self.get(path, params={"limit": page_size, "page": page})
                      if isinstance(resp, dict):
                          page_items = resp.get("data", [])
                          if isinstance(page_items, dict):
                              page_items = page_items.get("items", page_items.get("workerManagers", []))
                          elif not isinstance(page_items, list):
                              page_items = []
                      else:
                          page_items = []
                      if not page_items:
                          break
                      items.extend(page_items)
                      pagination = resp.get("pagination", {}) if isinstance(resp, dict) else {}
                      if not pagination.get("hasNextPage", False):
                          break
                      page += 1
                  return items

          def safe_slug(s: str) -> str:
              keep = []
              for ch in (s or ""):
                  if ch.isalnum() or ch in ("-", "_", "."):
                      keep.append(ch)
                  elif ch.isspace():
                      keep.append("_")
              return "".join(keep).strip("._-") or "agent"

          async def list_worker_managers(api: MaisaAPI, org_id: str, workspace_id: str) -> List[Dict[str, Any]]:
              path = f"/maisa-bff/organizations/{org_id}/workspaces/{workspace_id}/worker-managers"
              return await api.get_paginated(path)

          async def get_worker_manager(api: MaisaAPI, wm_id: str) -> Dict[str, Any]:
              resp = await api.get(f"/maisa-bff/worker-manager/{wm_id}")
              return resp.get("data", resp) if isinstance(resp, dict) else resp

          async def export_agent(api: MaisaAPI, version_id: str) -> bytes:
              return await api.get(f"/maisa-bff/workers/{version_id}/export", raw=True)

          async def main():
              source_url = os.environ["SOURCE_URL"]
              auth_credential = os.environ["MAISA_AUTH_CREDENTIAL"]
              auth_type = os.environ.get("AUTH_TYPE", "cookie")
              org_id = os.environ["ORGANIZATION_ID"]
              workspace_id = os.environ["WORKSPACE_ID"]
              mode = os.environ.get("MODE", "all")
              target_wm_id = os.environ.get("WORKER_MANAGER_ID", "")
              export_dir = Path(os.environ["EXPORT_DIR"])

              if mode not in ("all", "single"):
                  raise SystemExit(f"❌ Invalid mode: {mode}")
              if mode == "single" and not target_wm_id:
                  raise SystemExit("❌ mode=single but WORKER_MANAGER_ID is missing")

              print(f"🔧 Maisa URL: {source_url}")
              print(f"🔐 Auth type: {auth_type}")
              print(f"📁 Organization ID: {org_id}")
              print(f"📁 Workspace ID: {workspace_id}")
              print(f"📦 Export mode: {mode}")

              api = MaisaAPI(base_url=source_url, auth_credential=auth_credential, auth_type=auth_type)

              if mode == "single":
                  print(f"\n🤖 Fetching worker manager: {target_wm_id}")
                  wm = await get_worker_manager(api, target_wm_id)
                  worker_managers = [wm] if wm else []
              else:
                  print(f"\n🤖 Fetching all worker managers from workspace...")
                  worker_managers = await list_worker_managers(api, org_id, workspace_id)

              if not worker_managers:
                  raise SystemExit("❌ No worker managers found")

              print(f"✅ Found {len(worker_managers)} worker manager(s):")
              for wm in worker_managers:
                  wm_id = wm.get("id", wm.get("_id", "N/A"))
                  last_vid = wm.get("lastVersionId", "N/A")
                  print(f"  - {wm.get('name', 'N/A')} (wm_id={wm_id}, lastVersionId={last_vid}) [{wm.get('status', 'N/A')}]")

              export_dir.mkdir(parents=True, exist_ok=True)

              exported_count = 0
              failed_count = 0

              for wm in worker_managers:
                  wm_id = wm.get("id", wm.get("_id", ""))
                  wm_name = wm.get("name", "unnamed")
                  wm_status = wm.get("status", "unknown")
                  version_id = wm.get("lastVersionId") or wm.get("deployedVersionId") or ""

                  print(f"\n  📥 Exporting {wm_name} (wm_id={wm_id}, version={version_id}) ...")

                  if not version_id:
                      print(f"    ⚠️  Skipped — no lastVersionId found, fetching full WM detail...")
                      try:
                          full_wm = await get_worker_manager(api, wm_id)
                          version_id = full_wm.get("lastVersionId") or full_wm.get("deployedVersionId") or ""
                      except Exception as e:
                          print(f"    ❌ Could not fetch WM detail: {e}")

                  if not version_id:
                      print(f"    ❌ Skipped — no version ID available")
                      failed_count += 1
                      continue

                  try:
                      export_bytes = await export_agent(api, version_id)

                      # Save as base64 if binary, as-is if already text
                      try:
                          content = export_bytes.decode("utf-8").strip() + "\n"
                      except UnicodeDecodeError:
                          content = base64.b64encode(export_bytes).decode("utf-8") + "\n"

                      filename = f"{safe_slug(wm_name)}__{wm_status}__{wm_id}.b64"
                      out_path = export_dir / filename
                      out_path.write_text(content, encoding="utf-8")

                      print(f"    ✅ Wrote {out_path} ({len(content)} chars)")
                      exported_count += 1

                  except Exception as e:
                      error_msg = str(e)
                      if "403" in error_msg or "PERMISSION_DENIED" in error_msg:
                          print(f"    ⚠️  Skipped (no permissions)")
                      elif "401" in error_msg:
                          print(f"    ⚠️  Skipped (authentication failed)")
                      else:
                          print(f"    ❌ Error: {error_msg[:200]}")
                      failed_count += 1

              print(f"\n✅ Export completed!")
              print(f"📊 Summary: {exported_count} exported, {failed_count} failed/skipped")
              print(f"📁 Files written to: {export_dir}")

          asyncio.run(main())
          EOF

      - name: Commit & push exports
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "agents/${{ inputs.workspace_name }}"

          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit."
            exit 0
          fi

          git commit -m "chore(maisa): export agents to agents/${{ inputs.workspace_name }}/${{ steps.ts.outputs.value }} (run ${{ github.run_id }})"
          git push origin HEAD:feature/export-data
