name: Export Maisa Agents

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Source Maisa URL (e.g., https://gppaas-maisa-plat.sgtech.pre.corp)"
        required: true
      worker_id:
        description: "Worker version ID to export (lastVersionId from the worker manager)"
        required: true
      workspace_name:
        description: "Folder name for Git storage (agents/<workspace_name>/...)"
        required: true
      auth_type:
        description: "Authentication type"
        required: true
        default: "cookie"
        type: choice
        options:
          - "cookie"
          - "api_key"

  workflow_call:
    inputs:
      source_url:
        required: true
        type: string
      worker_id:
        required: true
        type: string
      workspace_name:
        required: true
        type: string
      auth_type:
        required: false
        type: string
        default: "cookie"
    secrets:
      maisa_auth_credential:
        required: true

permissions:
  contents: write

jobs:
  export-agents:
    runs-on: base-runner

    steps:
      - name: Checkout export branch
        uses: actions/checkout@v4
        with:
          ref: feature/export-data
          fetch-depth: 0

      - name: Compute export timestamp
        id: ts
        shell: bash
        run: |
          echo "value=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Export agent to agents/<workspace>/<timestamp>
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          MAISA_AUTH_CREDENTIAL: ${{ secrets.maisa_auth_credential || secrets.MAISA_AUTH_CREDENTIAL }}
          AUTH_TYPE: ${{ inputs.auth_type }}
          WORKER_ID: ${{ inputs.worker_id }}
          WORKSPACE_NAME: ${{ inputs.workspace_name }}
          EXPORT_DIR: agents/${{ inputs.workspace_name }}/${{ steps.ts.outputs.value }}
        run: |
          python << 'EOF'
          import asyncio
          import base64
          import os
          from pathlib import Path
          import httpx

          TIMEOUT = 120

          def _headers(auth_type: str, auth_credential: str) -> dict:
              headers = {
                  "Accept": "application/json",
                  "User-Agent": "Mozilla/5.0 (compatible; MaisaExporter/1.0)"
              }
              if auth_type == "api_key":
                  headers["Authorization"] = f"Bearer {auth_credential}"
              elif auth_type == "cookie":
                  headers["Cookie"] = auth_credential
              return headers

          async def main():
              source_url = os.environ["SOURCE_URL"].strip()
              auth_credential = os.environ["MAISA_AUTH_CREDENTIAL"]
              auth_type = os.environ.get("AUTH_TYPE", "cookie")
              worker_id = os.environ["WORKER_ID"].strip()
              export_dir = Path(os.environ["EXPORT_DIR"])

              url = f"{source_url.rstrip('/')}/maisa-bff/workers/{worker_id}/export"
              safe_cookie = auth_credential[:40] + "...[MASKED]" if auth_type == "cookie" else ""

              print(f"🔧 Maisa URL:  {source_url}")
              print(f"🔐 Auth type:  {auth_type}")
              print(f"🤖 Worker ID:  {worker_id}")
              print(f"🌐 GET {url}")
              if safe_cookie:
                  print(f"   Cookie: {safe_cookie}")

              async with httpx.AsyncClient(timeout=TIMEOUT, verify=False, follow_redirects=True) as client:
                  resp = await client.get(url, headers=_headers(auth_type, auth_credential))

              if resp.status_code >= 400:
                  raise SystemExit(f"❌ HTTP {resp.status_code}: {resp.text[:500]}")

              export_bytes = resp.content
              try:
                  content = export_bytes.decode("utf-8").strip() + "\n"
              except UnicodeDecodeError:
                  content = base64.b64encode(export_bytes).decode("utf-8") + "\n"

              export_dir.mkdir(parents=True, exist_ok=True)
              filename = f"{worker_id}.b64"
              out_path = export_dir / filename
              out_path.write_text(content, encoding="utf-8")

              print(f"\n✅ Wrote {out_path} ({len(content)} chars)")

          asyncio.run(main())
          EOF

      - name: Commit & push export
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "agents/${{ inputs.workspace_name }}"

          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit."
            exit 0
          fi

          git commit -m "chore(maisa): export agent ${{ inputs.worker_id }} to agents/${{ inputs.workspace_name }}/${{ steps.ts.outputs.value }} (run ${{ github.run_id }})"
          git push origin HEAD:feature/export-data
