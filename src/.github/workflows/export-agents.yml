name: Export Maisa Agents

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Source Maisa URL (e.g., https://gppaas-maisa.dev.sgtech.corp)"
        required: true
        default: "https://gppaas-maisa.dev.sgtech.corp"
      workspace_name:
        description: "Workspace name for export path (agents/<workspace_name>/...)"
        required: true
      organization_id:
        description: "Organization ID in Maisa"
        required: true
      workspace_id:
        description: "Workspace ID in Maisa"
        required: true
      auth_type:
        description: "Authentication type: cookie or api_key"
        required: true
        default: "cookie"
        type: choice
        options:
          - "cookie"
          - "api_key"
      mode:
        description: "Export mode: all = exports all agents, single = exports one agent by id"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "single"
      worker_manager_id:
        description: "Worker Manager ID (only if mode=single)"
        required: false

  workflow_call:
    inputs:
      source_url:
        required: true
        type: string
      workspace_name:
        required: true
        type: string
      organization_id:
        required: true
        type: string
      workspace_id:
        required: true
        type: string
      auth_type:
        required: false
        type: string
        default: "cookie"
      mode:
        required: false
        type: string
        default: "all"
      worker_manager_id:
        required: false
        type: string
    secrets:
      maisa_auth_credential:
        required: true

permissions:
  contents: write

jobs:
  export-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout export branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute export timestamp
        id: ts
        shell: bash
        run: |
          echo "value=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Export agents to agents/<workspace>/<timestamp>
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          MAISA_AUTH_CREDENTIAL: ${{ secrets.maisa_auth_credential || secrets.MAISA_AUTH_CREDENTIAL }}
          AUTH_TYPE: ${{ inputs.auth_type }}
          ORGANIZATION_ID: ${{ inputs.organization_id }}
          WORKSPACE_ID: ${{ inputs.workspace_id }}
          WORKSPACE_NAME: ${{ inputs.workspace_name }}
          MODE: ${{ inputs.mode }}
          WORKER_MANAGER_ID: ${{ inputs.worker_manager_id }}
          EXPORT_DIR: agents/${{ inputs.workspace_name }}/${{ steps.ts.outputs.value }}
        run: |
          python << 'EOF'
          import asyncio
          import os
          import json
          import ssl
          from dataclasses import dataclass
          from typing import Any, Optional, Dict, List
          from pathlib import Path
          import httpx

          TIMEOUT = 120

          @dataclass
          class MaisaAPI:
              base_url: str
              auth_credential: str
              auth_type: str  # "cookie" or "api_key"

              def _headers(self) -> Dict[str, str]:
                  headers = {
                      "Accept": "application/json",
                      "Content-Type": "application/json",
                      "User-Agent": "Mozilla/5.0 (compatible; MaisaExporter/1.0)"
                  }
                  
                  if self.auth_type == "api_key":
                      headers["Authorization"] = f"Bearer {self.auth_credential}"
                  elif self.auth_type == "cookie":
                      headers["Cookie"] = self.auth_credential
                  
                  return headers

              async def _request(
                  self,
                  method: str,
                  path: str,
                  *,
                  json_body: Optional[Any] = None,
                  params: Optional[Dict[str, Any]] = None,
              ) -> Any:
                  url = f"{self.base_url.rstrip('/')}{path}"
                  
                  # Create SSL context that doesn't verify certificates (for dev environments)
                  ssl_context = ssl.create_default_context()
                  ssl_context.check_hostname = False
                  ssl_context.verify_mode = ssl.CERT_NONE
                  
                  while True:
                      async with httpx.AsyncClient(
                          timeout=TIMEOUT,
                          verify=False,  # Disable SSL verification
                          follow_redirects=True
                      ) as client:
                          kwargs = {"headers": self._headers()}
                          if json_body is not None:
                              kwargs["json"] = json_body
                          if params is not None:
                              kwargs["params"] = params
                          
                          resp = await client.request(method, url, **kwargs)
                          
                          if resp.status_code == 429:
                              print("  ⏳ Rate limited, waiting 2s...")
                              await asyncio.sleep(2)
                              continue
                          
                          if resp.status_code >= 400:
                              error_text = resp.text[:500]
                              raise Exception(f"HTTP {resp.status_code}: {error_text}")
                          
                          if not resp.content:
                              return None
                          
                          return resp.json()

              async def get(self, path: str, **kw: Any) -> Any:
                  return await self._request("GET", path, **kw)

              async def get_paginated(
                  self, 
                  path: str, 
                  *, 
                  page_size: int = 100
              ) -> List[Dict[str, Any]]:
                  """Get paginated results from Maisa API"""
                  items: List[Dict[str, Any]] = []
                  page = 1
                  
                  while True:
                      resp = await self.get(path, params={"limit": page_size, "page": page})
                      
                      # Handle different response formats
                      if isinstance(resp, dict):
                          page_items = resp.get("data", [])
                          if isinstance(page_items, dict):
                              page_items = page_items.get("items", page_items.get("workerManagers", []))
                          elif not isinstance(page_items, list):
                              page_items = []
                      else:
                          page_items = []
                      
                      if not page_items:
                          break
                      
                      items.extend(page_items)
                      
                      # Check pagination
                      pagination = resp.get("pagination", {}) if isinstance(resp, dict) else {}
                      if not pagination.get("hasNextPage", False):
                          break
                      
                      page += 1
                  
                  return items

          def safe_slug(s: str) -> str:
              """Convert string to safe filename"""
              keep = []
              for ch in (s or ""):
                  if ch.isalnum() or ch in ("-", "_", "."):
                      keep.append(ch)
                  elif ch.isspace():
                      keep.append("_")
              out = "".join(keep).strip("._-")
              return out or "agent"

          async def list_worker_managers(
              api: MaisaAPI, 
              org_id: str, 
              workspace_id: str
          ) -> List[Dict[str, Any]]:
              """List all worker managers in a workspace"""
              path = f"/maisa-bff/organizations/{org_id}/workspaces/{workspace_id}/worker-managers"
              return await api.get_paginated(path)

          async def get_worker_manager(
              api: MaisaAPI, 
              worker_manager_id: str
          ) -> Dict[str, Any]:
              """Get a single worker manager by ID"""
              path = f"/maisa-bff/worker-manager/{worker_manager_id}"
              resp = await api.get(path)
              return resp.get("data", resp) if isinstance(resp, dict) else resp

          async def main():
              source_url = os.environ["SOURCE_URL"]
              auth_credential = os.environ["MAISA_AUTH_CREDENTIAL"]
              auth_type = os.environ.get("AUTH_TYPE", "cookie")
              org_id = os.environ["ORGANIZATION_ID"]
              workspace_id = os.environ["WORKSPACE_ID"]
              mode = os.environ.get("MODE", "all")
              worker_manager_id = os.environ.get("WORKER_MANAGER_ID", "")
              export_dir = Path(os.environ["EXPORT_DIR"])

              if mode not in ("all", "single"):
                  raise SystemExit(f"❌ Invalid mode: {mode}")

              if mode == "single" and not worker_manager_id:
                  raise SystemExit("❌ mode=single but WORKER_MANAGER_ID is missing")

              print(f"🔧 Maisa URL: {source_url}")
              print(f"🔐 Auth type: {auth_type}")
              print(f"📁 Organization ID: {org_id}")
              print(f"📁 Workspace ID: {workspace_id}")
              print(f"📦 Export mode: {mode}")

              api = MaisaAPI(
                  base_url=source_url, 
                  auth_credential=auth_credential,
                  auth_type=auth_type
              )

              # Get worker managers
              if mode == "single":
                  print(f"\n🤖 Fetching single worker manager: {worker_manager_id}")
                  wm = await get_worker_manager(api, worker_manager_id)
                  worker_managers = [wm] if wm else []
              else:
                  print(f"\n🤖 Fetching all worker managers from workspace...")
                  worker_managers = await list_worker_managers(api, org_id, workspace_id)

              if not worker_managers:
                  raise SystemExit("❌ No worker managers found")

              print(f"✅ Found {len(worker_managers)} worker manager(s):")
              for wm in worker_managers:
                  name = wm.get("name", "N/A")
                  wm_id = wm.get("id", wm.get("_id", "N/A"))
                  status = wm.get("status", "N/A")
                  runs = wm.get("totalRuns", 0)
                  print(f"  - {name} ({wm_id}) [{status}] - {runs} runs")

              # Create export directory
              export_dir.mkdir(parents=True, exist_ok=True)

              # Export each worker manager
              exported_count = 0
              failed_count = 0
              
              for wm in worker_managers:
                  wm_id = wm.get("id", wm.get("_id", ""))
                  wm_name = wm.get("name", "unnamed")
                  wm_status = wm.get("status", "unknown")

                  print(f"\n  📥 Exporting {wm_name} ({wm_id}) [{wm_status}] ...")

                  try:
                      # Get full worker manager details
                      full_wm = await get_worker_manager(api, wm_id)

                      # Create filename
                      filename = f"{safe_slug(wm_name)}__{wm_status}__{wm_id}.json"
                      out_path = export_dir / filename

                      # Write JSON
                      content = json.dumps(full_wm, indent=2, ensure_ascii=False) + "\n"
                      out_path.write_text(content, encoding="utf-8")

                      print(f"    ✅ Wrote {out_path} ({len(content)} chars)")
                      exported_count += 1
                      
                  except Exception as e:
                      error_msg = str(e)
                      if "403" in error_msg or "PERMISSION_DENIED" in error_msg:
                          print(f"    ⚠️  Skipped (no permissions)")
                      elif "401" in error_msg:
                          print(f"    ⚠️  Skipped (authentication failed)")
                      else:
                          print(f"    ❌ Error: {error_msg[:100]}")
                      failed_count += 1

              print(f"\n✅ Export completed!")
              print(f"📊 Summary:")
              print(f"   - Total workers found: {len(worker_managers)}")
              print(f"   - Successfully exported: {exported_count}")
              print(f"   - Failed/Skipped: {failed_count}")
              print(f"📁 Files written to: {export_dir}")

          asyncio.run(main())
          EOF

      - name: Commit & push exports
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "agents/${{ inputs.workspace_name }}"

          if git diff --cached --quiet; then
            echo "ℹ️  No changes to commit."
            exit 0
          fi

          git commit -m "chore(maisa): export agents to agents/${{ inputs.workspace_name }}/${{ steps.ts.outputs.value }} (run ${{ github.run_id }})"
          git push origin HEAD:main
