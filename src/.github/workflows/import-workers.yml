name: Import Workers

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target Maisa URL"
        required: true
      workspace_name:
        description: "Workspace SOURCE (folder workers/<workspace_name>/...)"
        required: true
      target_workspace_name:
        description: "Workspace TARGET in Maisa (used to resolve API key)"
        required: true
      target_organization_id:
        description: "Target Maisa organization ID"
        required: true
      target_workspace_id:
        description: "Target Maisa workspace ID"
        required: true
      snapshot:
        description: "Snapshot folder (YYYYMMDD-HHMMSS). Empty = latest"
        required: false
      mode:
        description: "Import mode: all = import all workers, single = import one worker by id"
        required: false
        default: "all"
        type: choice
        options:
          - "all"
          - "single"
      worker_id:
        description: "Worker id (only if mode=single). It's the file name id __<id>.b64"
        required: false

  workflow_call:
    inputs:
      target_url:
        required: true
        type: string
      workspace_name:
        required: true
        type: string
      target_workspace_name:
        required: true
        type: string
      target_organization_id:
        required: true
        type: string
      target_workspace_id:
        required: true
        type: string
      snapshot:
        required: false
        type: string
      mode:
        required: false
        type: string
        default: "all"
      worker_id:
        required: false
        type: string
    secrets:
      maisa_api_keys_json:
        required: true

permissions:
  contents: read

jobs:
  qa-test:
    name: QA gate (pre-check)
    runs-on: base-runner

    steps:
      - name: Checkout export branch (read exports)
        uses: actions/checkout@v4
        with:
          ref: feature/export-data
          fetch-depth: 1

      - name: Run QA test script (must print OK)
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "scripts/qa-test.py" ]; then
            echo "❌ scripts/qa-test.py not found. Failing pipeline."
            exit 1
          fi

          echo "✅ QA test script found. Running validation..."

          OUT="$(python scripts/qa-test.py | tee /dev/stderr)"

          if ! echo "$OUT" | grep -q "OK"; then
            echo "❌ qa-test.py did not print OK. Failing workflow and stopping downstream jobs."
            exit 1
          fi

          echo "✅ QA test passed"

  import-workers:
    runs-on: base-runner
    needs: qa-test

    steps:
      - name: Checkout export branch (read exports)
        uses: actions/checkout@v4
        with:
          ref: feature/export-data
          fetch-depth: 1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Resolve TARGET_MAISA_API_KEY from JSON secret (by target_workspace_name)
        env:
          TARGET_WORKSPACE_NAME: ${{ inputs.target_workspace_name }}
          MAISA_API_KEYS_JSON: ${{ secrets.maisa_api_keys_json || secrets.MAISA_API_KEYS_JSON }}
        shell: bash
        run: |
          python - <<'PY'
          import json, os

          ws = os.environ.get("TARGET_WORKSPACE_NAME", "").strip()
          raw = os.environ.get("MAISA_API_KEYS_JSON", "").strip()

          if not ws:
              raise SystemExit("❌ Missing target workspace name (target_workspace_name).")

          if not raw:
              raise SystemExit(
                  "❌ Missing JSON secret. Define GitHub secret MAISA_API_KEYS_JSON (workflow_dispatch) "
                  "or pass secrets.maisa_api_keys_json (workflow_call)."
              )

          try:
              data = json.loads(raw)
          except Exception as e:
              raise SystemExit(f"❌ MAISA_API_KEYS_JSON is not valid JSON: {e}")

          if not isinstance(data, dict):
              raise SystemExit("❌ MAISA_API_KEYS_JSON must be a JSON object like {\"workspace\": \"<api_key>\", ...}")

          key = data.get(ws)
          if not key:
              available = ", ".join(sorted(map(str, data.keys())))
              raise SystemExit(f"❌ No API key found for target workspace '{ws}'. Available keys: {available}")

          print(f"::add-mask::{key}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"TARGET_MAISA_API_KEY={key}\n")
          PY

      - name: Import workers from Git snapshot
        env:
          TARGET_MAISA_URL: ${{ inputs.target_url }}
          TARGET_MAISA_API_KEY: ${{ env.TARGET_MAISA_API_KEY }}
          WORKSPACE_NAME: ${{ inputs.workspace_name }}
          TARGET_ORGANIZATION_ID: ${{ inputs.target_organization_id }}
          TARGET_WORKSPACE_ID: ${{ inputs.target_workspace_id }}
          SNAPSHOT: ${{ inputs.snapshot }}
          MODE: ${{ inputs.mode }}
          WORKER_ID: ${{ inputs.worker_id }}
        run: |
          python << 'EOF'
          import asyncio
          import base64
          import json
          import os
          from dataclasses import dataclass, field
          from typing import Any, Optional, Dict, List, Tuple
          from pathlib import Path
          import httpx

          TIMEOUT = 120

          @dataclass
          class MaisaAPI:
              base_url: str
              api_key: str

              def _headers(self) -> Dict[str, str]:
                  return {"Authorization": f"Bearer {self.api_key}"}

              async def _request(
                  self,
                  method: str,
                  path: str,
                  *,
                  json_body: Optional[Any] = None,
                  params: Optional[Dict[str, Any]] = None,
                  raw: bool = False,
              ) -> Any:
                  url = f"{self.base_url.rstrip('/')}{path}"
                  while True:
                      async with httpx.AsyncClient(timeout=TIMEOUT) as client:
                          kwargs = {"headers": self._headers(), "follow_redirects": True}
                          if json_body is not None:
                              kwargs["json"] = json_body
                          if params is not None:
                              kwargs["params"] = params
                          resp = await client.request(method, url, **kwargs)
                          if resp.status_code == 429:
                              print("  ⏳ Rate limited, waiting 2s...")
                              await asyncio.sleep(2)
                              continue
                          resp.raise_for_status()
                          if raw:
                              return resp.content
                          if resp.headers.get("content-type", "").startswith("application/octet-stream"):
                              return resp.content
                          if not resp.content:
                              return None
                          return resp.json()

              async def post(self, path: str, **kw: Any) -> Any:
                  return await self._request("POST", path, **kw)

          @dataclass
          class MigrationResult:
              workers: List[Dict[str, Any]] = field(default_factory=list)
              errors: List[str] = field(default_factory=list)

          async def import_worker(api: MaisaAPI, org_id: str, workspace_id: str, definition: str) -> Any:
              return await api.post(
                  f"/organizations/{org_id}/workspaces/{workspace_id}/workers/import",
                  json_body={"definition": definition},
              )

          def pick_snapshot_dir(base_dir: Path, snapshot: str) -> Path:
              if snapshot:
                  p = base_dir / snapshot
                  if not p.exists():
                      raise RuntimeError(f"Snapshot folder not found: {p}")
                  return p
              candidates = sorted([p for p in base_dir.iterdir() if p.is_dir()])
              if not candidates:
                  raise RuntimeError(f"No snapshot folders found under {base_dir}")
              return candidates[-1]

          def filename_worker_id(p: Path) -> str:
              parts = p.stem.split("__")
              return parts[-1] if len(parts) >= 3 else ""

          def try_extract_metadata(definition: str) -> Tuple[str, str, str]:
              try:
                  raw = base64.b64decode(definition)
                  decoded = json.loads(raw.decode("utf-8"))
              except Exception:
                  try:
                      decoded = json.loads(definition)
                  except Exception:
                      return "", "worker", ""

              if isinstance(decoded, dict):
                  name = decoded.get("name") or decoded.get("workerName", "")
                  wtype = decoded.get("type", "worker")
                  wid = decoded.get("id", "")
                  if name:
                      return str(name), str(wtype), str(wid)

              if isinstance(decoded, list) and decoded:
                  first = decoded[0]
                  if isinstance(first, dict):
                      name = first.get("name", "")
                      wtype = first.get("type", "worker")
                      wid = first.get("id", "")
                      if name:
                          return str(name), str(wtype), str(wid)

              return "", "worker", ""

          async def main():
              target_url = os.environ["TARGET_MAISA_URL"]
              target_key = os.environ["TARGET_MAISA_API_KEY"]
              workspace_name = os.environ["WORKSPACE_NAME"]
              org_id = os.environ["TARGET_ORGANIZATION_ID"]
              ws_id = os.environ["TARGET_WORKSPACE_ID"]
              snapshot = os.environ.get("SNAPSHOT", "")
              mode = os.environ.get("MODE") or "all"
              worker_id = os.environ.get("WORKER_ID") or ""

              if mode not in ("all", "single"):
                  raise SystemExit(f"❌ Invalid mode: {mode}")
              if mode == "single" and not worker_id:
                  raise SystemExit("❌ mode=single requires worker_id")

              base_dir = Path("workers") / workspace_name
              if not base_dir.exists():
                  raise SystemExit(f"❌ Workspace folder not found: {base_dir}")

              snapshot_dir = pick_snapshot_dir(base_dir, snapshot)
              print(f"📦 Using snapshot dir: {snapshot_dir}")

              files = sorted(snapshot_dir.glob("*.b64"))
              if mode == "single":
                  files = [p for p in files if p.stem.endswith(f"__{worker_id}")]
                  if not files:
                      raise SystemExit(f"❌ No .b64 file found for worker_id={worker_id} in {snapshot_dir}")

              print(f"⚙️  Found {len(files)} export file(s) to import")

              target = MaisaAPI(base_url=target_url, api_key=target_key)
              result = MigrationResult()

              print("=" * 60)
              print("Maisa Worker Import (from Git)")
              print("=" * 60)
              print(f"Target: {target_url}")
              print(f"Organization ID: {org_id}")
              print(f"Workspace ID: {ws_id}")
              print(f"Workspace source (folder): {workspace_name}")
              print(f"Snapshot: {snapshot_dir.name}")
              print(f"Mode: {mode}")
              if mode == "single":
                  print(f"Worker ID (filename): {worker_id}")
              print("=" * 60)

              for p in files:
                  try:
                      definition = p.read_text(encoding="utf-8").strip()
                      w_id_in_filename = filename_worker_id(p)

                      w_name, w_type, w_id_in_payload = try_extract_metadata(definition)
                      if not w_name:
                          w_name = p.stem
                          w_type = "worker"

                      print(f"\n  File: {p.name}")
                      print(f"  Worker: {w_name} ({w_id_in_payload or w_id_in_filename or 'n/a'}) [{w_type}]")
                      print("    Importing...")

                      created = await import_worker(target, org_id, ws_id, definition)
                      await asyncio.sleep(1)

                      new_id = None
                      if isinstance(created, dict):
                          new_id = created.get("id") or created.get("workerId") or created.get("reference")
                      elif isinstance(created, list) and created:
                          first = created[0]
                          new_id = first.get("id") or first.get("reference")

                      if new_id:
                          print(f"    ✅ Imported as {new_id}")
                          result.workers.append({
                              "source_id": w_id_in_payload or w_id_in_filename,
                              "target_id": new_id,
                              "name": w_name,
                          })
                      else:
                          print("    ✅ Imported (no reference returned)")
                          result.workers.append({
                              "source_id": w_id_in_payload or w_id_in_filename,
                              "target_id": None,
                              "name": w_name,
                          })

                  except Exception as e:
                      msg = f"File '{p.name}': {e}"
                      result.errors.append(msg)
                      print(f"    ❌ Failed: {e}")

              print("\n" + "=" * 60)
              print("Import Summary")
              print("=" * 60)
              print(f"  Workers: {len(result.workers)} processed")
              if result.errors:
                  print(f"\n  ❌ Errors ({len(result.errors)}):")
                  for err in result.errors:
                      print(f"    - {err}")
                  print("\n❌ Import failed with errors. Failing pipeline.")
                  raise SystemExit(1)

          asyncio.run(main())
          EOF

  post-import:
    name: Post import (run acceptance tests)
    runs-on: base-runner
    needs: import-workers

    steps:
      - name: Checkout export branch (read exports)
        uses: actions/checkout@v4
        with:
          ref: feature/export-data
          fetch-depth: 1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Resolve TARGET_MAISA_API_KEY from JSON secret (by target_workspace_name)
        env:
          TARGET_WORKSPACE_NAME: ${{ inputs.target_workspace_name }}
          MAISA_API_KEYS_JSON: ${{ secrets.maisa_api_keys_json || secrets.MAISA_API_KEYS_JSON }}
        shell: bash
        run: |
          python - <<'PY'
          import json, os

          ws = os.environ.get("TARGET_WORKSPACE_NAME", "").strip()
          raw = os.environ.get("MAISA_API_KEYS_JSON", "").strip()

          if not ws:
              raise SystemExit("❌ Missing target workspace name (target_workspace_name).")

          if not raw:
              raise SystemExit(
                  "❌ Missing JSON secret. Define GitHub secret MAISA_API_KEYS_JSON (workflow_dispatch) "
                  "or pass secrets.maisa_api_keys_json (workflow_call)."
              )

          try:
              data = json.loads(raw)
          except Exception as e:
              raise SystemExit(f"❌ MAISA_API_KEYS_JSON is not valid JSON: {e}")

          if not isinstance(data, dict):
              raise SystemExit('❌ MAISA_API_KEYS_JSON must be a JSON object like {"workspace": "<api_key>", ...}')

          key = data.get(ws)
          if not key:
              available = ", ".join(sorted(map(str, data.keys())))
              raise SystemExit(f"❌ No API key found for target workspace '{ws}'. Available keys: {available}")

          print(f"::add-mask::{key}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"TARGET_MAISA_API_KEY={key}\n")
          PY

      - name: Run QA golden dataset tests
        env:
          TARGET_MAISA_URL: ${{ inputs.target_url }}
          TARGET_MAISA_API_KEY: ${{ env.TARGET_MAISA_API_KEY }}
          WORKSPACE_NAME: ${{ inputs.workspace_name }}
          SNAPSHOT: ${{ inputs.snapshot }}
          WORKER_ID: ${{ inputs.worker_id }}
        shell: bash
        run: |
          if [ ! -f "scripts/qa-dataset.json" ]; then
            echo "⚠️ scripts/qa-dataset.json not found. Skipping golden dataset tests."
            exit 0
          fi
          echo "✅ Golden dataset found. Running QA tests..."
          python scripts/qa-test.py

      - name: Check if post-import script exists
        id: check-post-import
        shell: bash
        run: |
          if [ ! -f "scripts/post_import.py" ]; then
            echo "⚠️ scripts/post_import.py not found. Skipping post-import tests."
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Post-import script found. Running acceptance tests..."
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Run post-import python script
        if: steps.check-post-import.outputs.exists == 'true'
        env:
          TARGET_MAISA_URL: ${{ inputs.target_url }}
          TARGET_MAISA_API_KEY: ${{ env.TARGET_MAISA_API_KEY }}
          WORKSPACE_NAME: ${{ inputs.workspace_name }}
          TARGET_WORKSPACE_NAME: ${{ inputs.target_workspace_name }}
          TARGET_ORGANIZATION_ID: ${{ inputs.target_organization_id }}
          TARGET_WORKSPACE_ID: ${{ inputs.target_workspace_id }}
          SNAPSHOT: ${{ inputs.snapshot }}
          MODE: ${{ inputs.mode }}
          WORKER_ID: ${{ inputs.worker_id }}
        run: |
          python scripts/post_import.py
